name: orpt-bench

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  benchmark:
    runs-on: benchmarks-orpt-bench
    container:
      image: docker.gitea.com/runner-images:ubuntu-latest
    env:
      BENCHMARK_CYCLE: ${BENCHMARK_CYCLE:-weekly}
      BENCHMARK_REPEATS: ${BENCHMARK_REPEATS:-1}
      BENCHMARK_WRITE_README: "1"
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runner image
        run: docker compose build

      - name: Sync model catalog
        run: docker compose run --rm runner sync-models

      - name: Apply selected benchmark cycle
        run: docker compose run --rm runner use-cycle "$BENCHMARK_CYCLE"

      - name: Validate fixtures
        run: docker compose run --rm runner validate

      - name: Run unit tests
        run: docker compose run --rm --entrypoint bash runner -lc "npm test"

      - name: Run benchmark
        run: docker compose run --rm runner benchmark

      - name: Commit updated artifacts
        run: |
          branch="${GITHUB_REF_NAME:-main}"
          bash scripts/persist-benchmark-results.sh "${branch}" "Update ORPT benchmark results"

      - name: Publish GitHub Pages from benchmark result
        env:
          PUBLISH_GITHUB_USERNAME: ${{ secrets.PUBLISH_GITHUB_USERNAME }}
          PUBLISH_GITHUB_TOKEN: ${{ secrets.PUBLISH_GITHUB_TOKEN }}
          PUBLISH_GITHUB_REPOSITORY: ${{ secrets.PUBLISH_GITHUB_REPOSITORY }}
          PUBLISH_GITHUB_PAGES_BRANCH: ${{ secrets.PUBLISH_GITHUB_PAGES_BRANCH }}
        run: bash scripts/publish-github-pages.sh
