services:
  runner:
    build:
      context: .
      dockerfile: ci/Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - runner_node_modules:/workspace/node_modules
    env_file:
      - .env.benchmark
    environment:
      OPENCODE_API_KEY: ${OPENCODE_API_KEY:-}
      ORPT_RESULTS_DIR: /workspace/results
      ORPT_TMP_DIR: /workspace/.tmp
      BENCHMARK_MODELS: ${BENCHMARK_MODELS:-}
      BENCHMARK_REPEATS: ${BENCHMARK_REPEATS:-}
      BENCHMARK_PROVIDER: ${BENCHMARK_PROVIDER:-}
      BENCHMARK_AGENT: ${BENCHMARK_AGENT:-}
      BENCHMARK_TASK_GLOB: ${BENCHMARK_TASK_GLOB:-}
      BENCHMARK_TIMEOUT_SECONDS: ${BENCHMARK_TIMEOUT_SECONDS:-}
      BENCHMARK_PROCESS_TIMEOUT_SECONDS: ${BENCHMARK_PROCESS_TIMEOUT_SECONDS:-}
      BENCHMARK_WRITE_README: ${BENCHMARK_WRITE_README:-}
      BENCHMARK_MODEL_CONCURRENCY: ${BENCHMARK_MODEL_CONCURRENCY:-}
      BENCHMARK_PROVIDER_OVERRIDES_JSON: ${BENCHMARK_PROVIDER_OVERRIDES_JSON:-}
      BENCHMARK_CYCLE: ${BENCHMARK_CYCLE:-}
    command: ["benchmark"]

volumes:
  runner_node_modules:
