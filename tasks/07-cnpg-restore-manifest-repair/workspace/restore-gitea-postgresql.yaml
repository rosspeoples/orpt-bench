apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-postgresql
  namespace: gitea
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 20Gi
    storageClass: ceph-rbd
  superuserSecret:
    name: gitea-postgresql-auth
  bootstrap:
    recovery:
      backup:
        name: latest-backup
      database: gitea
      owner: gitea
      secret:
        name: gitea-postgresql-auth
  backup:
    target: prefer-standby
    retentionPolicy: 7d
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/gitea-postgresql/
      endpointURL: https://s3.thepeoples.cc
      s3Credentials:
        accessKeyId:
          name: cnpg-backups-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backups-s3
          key: ACCESS_SECRET_KEY
        region:
          name: cnpg-backups-s3
          key: AWS_REGION
      data:
        compression: gzip
      wal:
        compression: gzip
