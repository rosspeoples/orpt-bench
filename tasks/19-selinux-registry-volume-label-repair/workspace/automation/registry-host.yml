- hosts: registry
  become: true
  tasks:
    - name: Label registry data path
      community.general.sefcontext:
        target: /var/lib/registry(/.*)?
        setype: var_t
        state: present

    - name: Restore registry labels
      ansible.builtin.command: restorecon -Rv /srv/containers/registry

    - name: Label registry tcp port
      community.general.seport:
        ports: "5443"
        proto: tcp
        setype: container_port_t
        state: present

    - name: Ensure registry data directory exists
      ansible.builtin.file:
        path: /srv/registry
        state: directory
        mode: "0750"
