apiVersion: v1
kind: ConfigMap
metadata:
  name: build-mcp-credential-registry
  namespace: ai-build
data:
  credentials.yaml: |
    version: v1
    credentials:
      - name: release-engineering-gitea-mcp
        enabled: true
        lane: build
        workspace: release-engineering
        provider: gitea
        accessMode: read_only
        allowedRepos:
          - benchmarks/orpt-bench
        isolationLevel: workspace-target-only
        sourceType: external-bootstrap
        sourceRef:
          bootstrapPath: thepeoples.dev/gitea/gitea
          bootstrapProperty: actions_api_token
          principalType: shared-bootstrap
        issuanceStatus: transitional
        target:
          openbaoPath: thepeoples.dev/ai-build/workspaces/release-engineering/mcp/gitea
          property: token
      - name: release-engineering-argocd-mcp
        enabled: true
        lane: build
        workspace: release-engineering
        provider: argocd
        accessMode: read_only
        allowedApplications:
          - platform-build
        isolationLevel: planned-per-workspace-principal
        sourceType: generated-account-token
        sourceRef:
          accountName: mcp-release-engineering
          principalType: dedicated-workspace-account
        issuanceStatus: planned
        target:
          openbaoPath: thepeoples.dev/ai-build/workspaces/release-engineering/mcp/argocd
          property: token
