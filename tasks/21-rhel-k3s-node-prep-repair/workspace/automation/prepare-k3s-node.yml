- hosts: k3s_servers
  become: true
  tasks:
    - name: Install node packages
      ansible.builtin.package:
        name:
          - curl
          - container-selinux
        state: present

    - name: Load overlay module
      community.general.modprobe:
        name: overlay
        state: present

    - name: Load br_netfilter module
      community.general.modprobe:
        name: br_netfilter
        state: absent

    - name: Enable ipv4 forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "0"
        sysctl_set: true
        state: present
        reload: true

    - name: Enable bridge netfilter
      ansible.posix.sysctl:
        name: net.bridge.bridge-nf-call-iptables
        value: "1"
        sysctl_set: true
        state: present
        reload: true

    - name: Open Kubernetes API port
      ansible.posix.firewalld:
        port: 6443/tcp
        permanent: true
        immediate: true
        state: enabled

    - name: Open flannel port
      ansible.posix.firewalld:
        port: 8472/tcp
        permanent: true
        immediate: true
        state: enabled

    - name: Open kubelet port
      ansible.posix.firewalld:
        port: 10250/tcp
        permanent: true
        immediate: true
        state: enabled
