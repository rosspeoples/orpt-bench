apiVersion: v1
kind: ConfigMap
metadata:
  name: build-mcp-credential-registry
  namespace: ai-build
data:
  credentials.yaml: "version: v1\ncredentials:\n- name: release-engineering-gitea-mcp\n\
    \  enabled: true\n  workspace: release-engineering\n  provider: gitea\n  sourceType:\
    \ external-bootstrap\n  target:\n    openbaoPath: thepeoples.dev/ai-build/workspaces/release-engineering/mcp/gitea\n\
    \    property: token\n  allowedRepos:\n  - benchmarks/orpt-bench\n- name: release-engineering-argocd-mcp\n\
    \  enabled: true\n  workspace: release-engineering\n  provider: argocd\n  sourceType:\
    \ generated-account-token\n  target:\n    openbaoPath: thepeoples.dev/ai-build/workspaces/release-engineering/mcp/argocd\n\
    \    property: token\n  allowedApplications:\n  - platform-build\n"
